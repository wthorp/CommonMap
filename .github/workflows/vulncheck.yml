name: Vulnerability Scan

on:
  schedule:
    - cron: "23 6 * * 1"
  workflow_dispatch:

concurrency:
  group: vulncheck-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install govulncheck
        run: GOBIN="$PWD/bin" go install golang.org/x/vuln/cmd/govulncheck@$(cat .govulncheck-version)
      - name: Scan for known vulnerabilities
        run: ./bin/govulncheck ./...
